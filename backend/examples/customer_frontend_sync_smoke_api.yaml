openapi: "3.0.3"
info:
  title: Customer Frontend Sync Smoke API
  version: "1.0.0"
  description: >
    Synthetic API used to smoke test frontend->backend contract synchronization
    for QA agent runs (scope, auth, mutation rules, and mixed endpoint types).
servers:
  - url: http://127.0.0.1:8000
paths:
  /auth/login:
    post:
      summary: Form login endpoint
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                type: object
                required:
                  - access_token
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    enum: [Bearer]
        "401":
          description: Invalid credentials

  /orders:
    get:
      summary: List orders
      security:
        - apiKeyAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, confirmed, cancelled]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
        "401":
          description: Missing or invalid auth
    post:
      summary: Create order
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
        "401":
          description: Missing or invalid auth
        "409":
          description: Duplicate order

  /orders/{orderId}:
    parameters:
      - in: path
        name: orderId
        required: true
        schema:
          type: string
          minLength: 2
    get:
      summary: Get single order
      security:
        - apiKeyAuth: []
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Missing or invalid auth
        "404":
          description: Order not found
    patch:
      summary: Update order
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPatch"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
        "401":
          description: Missing or invalid auth
        "404":
          description: Order not found
    delete:
      summary: Delete order
      security:
        - apiKeyAuth: []
      responses:
        "204":
          description: Order deleted
        "401":
          description: Missing or invalid auth
        "404":
          description: Order not found

  /orders/{orderId}/attachments:
    parameters:
      - in: path
        name: orderId
        required: true
        schema:
          type: string
    post:
      summary: Upload attachment using multipart form-data
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - comment
              properties:
                file:
                  type: string
                  format: binary
                comment:
                  type: string
                  minLength: 3
                  maxLength: 200
      responses:
        "201":
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"
        "400":
          description: Validation error
        "401":
          description: Missing or invalid auth
        "404":
          description: Order not found

  /reports/health:
    get:
      summary: Public health endpoint
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OrderSummary:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        createdAt:
          type: string
          format: date-time
    OrderCreate:
      type: object
      required:
        - customerEmail
        - amount
        - currency
      properties:
        customerEmail:
          type: string
          format: email
        amount:
          type: number
          minimum: 0.1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        note:
          type: string
          maxLength: 500
    OrderPatch:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        note:
          type: string
          maxLength: 500
    Order:
      allOf:
        - $ref: "#/components/schemas/OrderSummary"
        - type: object
          required:
            - customerEmail
            - amount
            - currency
          properties:
            customerEmail:
              type: string
              format: email
            amount:
              type: number
            currency:
              type: string
            note:
              type: string
    Attachment:
      type: object
      required:
        - id
        - fileName
      properties:
        id:
          type: string
        fileName:
          type: string
        uploadedAt:
          type: string
          format: date-time
